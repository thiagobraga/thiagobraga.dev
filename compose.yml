name: thiagobraga

services:
  app:
    container_name: thiagobraga-app
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
    command: bun run dev
    volumes: [.:/app, /app/node_modules, /app/dist]
    networks: [proxy]
    environment:
      NODE_ENV: development
    labels:
      traefik.enable: true
      traefik.http.routers.thiago-router.rule: Host(`thiagobraga.dev.local`)
      traefik.http.routers.thiago-router.entrypoints: websecure
      traefik.http.routers.thiago-router.tls: true
      traefik.http.services.thiago-service.loadbalancer.server.port: 8080

networks:
  proxy:
    external: true
